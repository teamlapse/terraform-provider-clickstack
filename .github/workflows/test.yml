name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  # Acceptance tests require a live ClickStack instance.
  # They run only when credentials are available (e.g. on main, not on forks).
  acceptance:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      TF_ACC: "1"
      CLICKSTACK_ORGANIZATION_ID: ${{ secrets.CLICKSTACK_ORGANIZATION_ID }}
      CLICKSTACK_SERVICE_ID: ${{ secrets.CLICKSTACK_SERVICE_ID }}
      CLICKSTACK_API_KEY_ID: ${{ secrets.CLICKSTACK_API_KEY_ID }}
      CLICKSTACK_API_KEY_SECRET: ${{ secrets.CLICKSTACK_API_KEY_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Acceptance Tests
        if: env.CLICKSTACK_API_KEY_ID != ''
        run: go test ./... -v -timeout 30m
